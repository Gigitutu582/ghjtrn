<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Узнать пожелание – Секретный Санта</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <span class="emoji-header">🎁</span>
        <h1>Узнать пожелание</h1>
        <p>Введите имя участника, которому вы дарите подарок:</p>
        <div class="input-group">
            <label for="friend-name">Имя друга</label>
            <input type="text" id="friend-name" placeholder="Например, Анна">
        </div>
        <button id="get-wish-btn">Узнать пожелание</button>
        <div id="wish-result" style="margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 8px; display: none;"></div>
        <div class="footer" style="margin-top: 20px;">
            <a href="index.html">← Вернуться к регистрации</a>
        </div>
    </div>
    <script src="wish.js"></script>
</body>
</html>
